<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collection</title>

    <!-- Connect CSS file -->
    <link rel="stylesheet" href="collection.css">
</head>
<body>

<section class="collection">

    <h2>Our Collection</h2>
    <p class="collection-text">
        Discover bold streetwear and retro-inspired fashion.
    </p>

    <div class="collection-container">

        <!-- Jeans -->

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1542272604-787c3835535d?q=80&w=1200&auto=format&fit=crop" alt="Jeans">

            <div class="product-info">
                <h3>Retro Denim Jeans</h3>
                <p>Classic fit with premium denim fabric.</p>
                <span>₹1,999</span>

                <button>Add to Cart</button>
            </div>
        </div>

        <!-- Shirt -->

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf?q=80&w=1200&auto=format&fit=crop" alt="Shirt">

            <div class="product-info">
                <h3>Urban Casual Shirt</h3>
                <p>Comfortable and stylish everyday wear.</p>
                <span>₹1,499</span>

                <button>Add to Cart</button>
            </div>
        </div>

        <!-- T-Shirt -->

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?q=80&w=1200&auto=format&fit=crop" alt="T-Shirt">

            <div class="product-info">
                <h3>Oversized Rebel Tee</h3>
                <p>Street-style oversized premium cotton t-shirt.</p>
                <span>₹999</span>

                <button>Add to Cart</button>
            </div>
        </div>

    </div>

</section>
</body>
</html>
